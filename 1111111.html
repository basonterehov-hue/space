<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>За горизонтом событий — Ссылки</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #050608 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Звездный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/1231630/stars.png') repeat;
            z-index: -1;
            opacity: 0.4;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin-top: 60px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #9b59b6; /* Фиолетовый акцент - цвет туманностей */
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.4);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 15px rgba(155, 89, 182, 0.5);
        }

        .description {
            font-size: 15px;
            color: #d1d1d1;
            margin-bottom: 45px;
            line-height: 1.4;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            color: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
        }

        /* YouTube: Красный */
        .yt { border-left: 6px solid #e74c3c; }
        .yt:hover { background: rgba(231, 76, 60, 0.2); transform: translateY(-3px); }

        /* Telegram: Синий */
        .tg { border-left: 6px solid #3498db; }
        .tg:hover { background: rgba(52, 152, 219, 0.2); transform: translateY(-3px); }

        /* Донат: Золотой */
        .dn { border-left: 6px solid #f1c40f; }
        .dn:hover { background: rgba(241, 196, 15, 0.2); transform: translateY(-3px); }

    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/6Rt6fWMr/image.png">

        <h1>За горизонтом событий</h1>
        <p class="description">Путешествие к самым далеким уголкам Вселенной и за пределы познания 🌌</p>

        <a href="https://www.youtube.com/@Space_4x" class="link-btn yt" target="_blank">📺 Наш YouTube канал</a>
        <a href="t.me/za_gorizontom_sobutiy" class="link-btn tg" target="_blank">🚀 Сообщество в Telegram</a>
        <a href="#" class="link-btn dn" target="_blank">💰 Поддержать экспедицию</a>
    </div>

</body>
</html>
