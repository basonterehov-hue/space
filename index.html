<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>За горизонтом событий — Ссылки</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #050608 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 90%;
            max-width: 420px;
            margin: 40px auto;
            text-align: center;
        }
        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px auto;
            object-fit: cover;
            border: 3px solid #9b59b6;
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.5);
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .description { font-size: 15px; color: #ccc; margin-bottom: 30px; }
        .links-wrapper { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .link-item {
            display: block;
            text-decoration: none;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .link-item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
        .youtube { border-left: 5px solid #ff0000; }
        .telegram { border-left: 5px solid #00d2ff; }
        .donate { border-left: 5px solid #ffd700; }
    </style>
</head>
<body>
    <div class="main-container">
        <img src="logo.png" alt="За горизонтом событий" class="profile-pic">
        <h1>За горизонтом событий</h1>
        <p class="description">Путешествие к самым далеким уголкам Вселенной и за пределы познания 🌌</p>
        <div class="links-wrapper">
            <a href="https://www.youtube.com/channel/UC3fCwwxXYy-aRXP6QyabrxQ" class="link-item youtube" target="_blank">📺 Наш YouTube канал</a>
            <a href="https://t.me/za_gorizontom_sobutiy" class="link-item telegram" target="_blank">🚀 Сообщество в Telegram</a>
            <a href="#" class="link-item donate" target="_blank">💰 Поддержать экспедицию</a>
        </div>
    </div>
</body>
</html>
