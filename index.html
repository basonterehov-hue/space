<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>За горизонтом событий — Ссылки</title>
    <style>
        /* Общие настройки страницы */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #050608 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрирование по горизонтали */
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Звездный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/1231630/stars.png') repeat;
            z-index: -1;
            opacity: 0.3;
        }

        /* Контейнер для контента */
        .main-container {
            width: 90%;
            max-width: 420px;
            margin: 60px auto; /* Отступ сверху и автоматические отступы по бокам */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Исправленный блок логотипа */
        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #9b59b6; /* Фиолетовая обводка под стиль космоса */
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.4);
            margin-bottom: 20px;
            display: block;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(155, 89, 182, 0.6);
        }

        .description {
            font-size: 15px;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* Кнопки-ссылки */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: block;
            text-decoration: none;
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        /* Цветовые акценты для кнопок */
        .youtube { border-left: 6px solid #ff0000; }
        .telegram { border-left: 6px solid #00d2ff; }
        .donate { border-left: 6px solid #ffd700; }

        .link-item:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://i.ibb.co/6Rt6fWMr/image.png" class="profile-pic">

        <h1>За горизонтом событий</h1>
        <p class="description">Путешествие к самым далеким уголкам Вселенной и за пределы познания 🌌</p>

        <div class="links-wrapper">
            <a href="https://www.youtube.com/channel/UC3fCwwxXYy-aRXP6QyabrxQ" class="link-item youtube" target="_blank">📺 Наш YouTube канал</a>
            
            <a href="https://t.me/za_gorizontom_sobutiy" class="link-item telegram" target="_blank">🚀 Группа в Telegram</a>
            
            <a href="#" class="link-item donate" target="_blank">💰 Поддержать проект</a>
        </div>
    </div>

</body>
</html>
